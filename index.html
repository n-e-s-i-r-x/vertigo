<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertigo AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-primary: #212121;
            --bg-secondary: #2f2f2f;
            --bg-tertiary: #3a3a3a;
            --bg-hover: #424242;
            --text-primary: #ececec;
            --text-secondary: #8e8ea0;
            --accent: #10a37f;
            --border-color: #3a3a3a;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden; position: fixed;
            -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            font-size: 15px; line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── INTRO ── */
        #intro {
            position: fixed; inset: 0;
            background: #171717;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            animation: introFade 2.8s ease forwards;
        }

        #intro-logo {
            width: 80px; height: 80px;
            border-radius: 20px;
            object-fit: cover;
            opacity: 0;
            animation: introLogo 2.8s ease forwards;
        }

        #intro-title {
            margin-top: 16px;
            font-size: 1.6rem; font-weight: 700;
            color: #ececec; letter-spacing: -0.02em;
            opacity: 0;
            animation: introLogo 2.8s ease forwards;
        }

        @keyframes introFade {
            0%   { opacity: 1; visibility: visible; }
            70%  { opacity: 1; visibility: visible; }
            95%  { opacity: 0; visibility: visible; }
            100% { opacity: 0; visibility: hidden; pointer-events: none; }
        }

        @keyframes introLogo {
            0%   { opacity: 0; transform: scale(0.85) translateY(12px); }
            20%  { opacity: 1; transform: scale(1) translateY(0); }
            75%  { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(1.04) translateY(-4px); }
        }

        /* ── APP ── */
        .app-container {
            display: flex; flex-direction: column;
            width: 100vw; height: 100vh; height: 100dvh;
            overflow: hidden;
            opacity: 0;
            animation: appFadeIn 0.5s ease 2.5s forwards;
        }

        @keyframes appFadeIn { to { opacity: 1; } }

        /* ── TOP BAR ── */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; height: 56px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; z-index: 100;
        }

        .app-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
        .top-bar-actions { display: flex; gap: 4px; }

        .icon-btn {
            background: transparent; border: none; color: var(--text-secondary);
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background var(--transition), color var(--transition), transform 0.15s ease;
            touch-action: manipulation;
        }
        .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .icon-btn:active { transform: scale(0.92); }
        .icon-btn svg { width: 18px; height: 18px; }

        /* ── CHAT ── */
        .chat-area {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 24px 0;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .chat-inner {
            max-width: 720px; margin: 0 auto; padding: 0 16px;
            display: flex; flex-direction: column; gap: 4px;
        }

        /* ── WELCOME ── */
        .welcome-message {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 80px 20px 40px; text-align: center;
            animation: popUp 0.4s ease;
        }
        .welcome-logo {
            width: 56px; height: 56px;
            border-radius: 14px; object-fit: cover;
            margin-bottom: 16px;
        }
        .welcome-title {
            font-size: clamp(1.3rem, 4vw, 1.6rem); font-weight: 700;
            color: var(--text-primary); letter-spacing: -0.02em; margin-bottom: 8px;
        }
        .welcome-subtitle { font-size: 0.9rem; color: var(--text-secondary); max-width: 340px; }

        /* ── MESSAGES ── */
        .message { display: flex; padding: 2px 0; }
        .message.user { justify-content: flex-end; animation: msgUser 0.25s ease; }
        .message.ai   { justify-content: flex-start; animation: popUp 0.3s ease; }

        @keyframes msgUser {
            from { opacity: 0; transform: translateX(16px) scale(0.97); }
            to   { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes popUp {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .message-bubble {
            max-width: min(75%, 560px); padding: 12px 16px;
            border-radius: var(--radius);
            word-wrap: break-word; overflow-wrap: break-word; word-break: break-word;
            font-size: 0.95rem; line-height: 1.65;
        }
        .message.user .message-bubble {
            background: var(--bg-secondary); color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }
        .message.ai .message-bubble {
            background: transparent; color: var(--text-primary);
            border-bottom-left-radius: 4px; padding-left: 4px;
        }

        /* ── IMAGE BUBBLE ── */
        .bubble-img-wrap {
            margin-top: 8px; cursor: pointer;
            border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border-color);
            width: 260px; height: 260px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-tertiary);
            transition: opacity var(--transition);
        }
        .bubble-img-wrap:hover { opacity: 0.88; }
        .bubble-img { width: 260px; height: 260px; object-fit: cover; display: none; border-radius: 12px; }
        .bubble-img.loaded { display: block; }
        .bubble-img-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; padding-left: 2px; }

        /* ── SKELETON ── */
        .img-skeleton {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
        }
        .img-skeleton-dots { display: flex; gap: 6px; }
        .img-skeleton-dots span {
            width: 7px; height: 7px; background: var(--accent);
            border-radius: 50%; animation: dotBounce 1.2s ease-in-out infinite; opacity: 0.7;
        }
        .img-skeleton-dots span:nth-child(2) { animation-delay: 0.15s; }
        .img-skeleton-dots span:nth-child(3) { animation-delay: 0.3s; }
        .img-skeleton-label { font-size: 12px; color: var(--text-secondary); }

        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%            { transform: translateY(-5px); opacity: 1; }
        }

        /* ── IMAGE ACTIONS ── */
        .img-actions { display: flex; gap: 6px; margin-top: 7px; }
        .img-action-btn {
            background: var(--bg-tertiary); border: 1px solid var(--border-color);
            color: var(--text-secondary); width: 30px; height: 30px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background var(--transition), color var(--transition), transform 0.15s ease;
            touch-action: manipulation; flex-shrink: 0;
        }
        .img-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .img-action-btn:active { transform: scale(0.9); }
        .img-action-btn svg { width: 14px; height: 14px; }

        /* ── LIGHTBOX ── */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.93);
            z-index: 9998; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        #lightbox.active { opacity: 1; visibility: visible; }
        #lightbox img { max-width: 92vw; max-height: 88dvh; border-radius: 12px; object-fit: contain; animation: popUp 0.25s ease; }
        #lightbox-close {
            position: absolute; top: 16px; right: 16px;
            background: rgba(255,255,255,0.1); border: none;
            color: #fff; width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: background var(--transition);
        }
        #lightbox-close:hover { background: rgba(255,255,255,0.2); }

        /* ── MARKDOWN ── */
        .message-bubble p { margin-bottom: 0.7em; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble h1, .message-bubble h2, .message-bubble h3 { margin: 1em 0 0.4em; font-weight: 600; }
        .message-bubble h1 { font-size: 1.3em; }
        .message-bubble h2 { font-size: 1.15em; }
        .message-bubble h3 { font-size: 1.05em; }
        .message-bubble ul, .message-bubble ol { margin: 0.4em 0; padding-left: 1.4em; }
        .message-bubble li { margin: 0.2em 0; }
        .message-bubble a { color: var(--accent); text-decoration: none; }
        .message-bubble a:hover { text-decoration: underline; }
        .message-bubble code { background: var(--bg-tertiary); padding: 2px 6px; border-radius: 5px; font-family: 'Fira Code','Monaco',monospace; font-size: 0.88em; }
        .message-bubble pre { margin: 10px 0; border-radius: 10px; overflow: hidden; max-width: 100%; border: 1px solid var(--border-color); }
        .message-bubble pre code { display: block; padding: 14px; background: #1a1a1a; overflow-x: auto; font-size: 13px; line-height: 1.5; }
        .code-header { display: flex; justify-content: space-between; align-items: center; background: #252525; padding: 7px 12px; font-size: 11px; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); }
        .copy-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 3px 8px; border-radius: 5px; font-size: 11px; transition: var(--transition); display: flex; align-items: center; gap: 4px; touch-action: manipulation; }
        .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .copy-btn.copied { color: var(--accent); }
        .copy-btn svg { width: 12px; height: 12px; }

        /* ── INPUT ── */
        .input-area { padding: 12px 16px 20px; background: var(--bg-primary); flex-shrink: 0; }
        .input-outer { max-width: 720px; margin: 0 auto; }

        .img-preview-wrap { display: none; align-items: center; gap: 8px; padding: 8px 12px 0; }
        .img-preview-wrap.visible { display: flex; }
        .img-preview-thumb {
            width: 48px; height: 48px; border-radius: 8px;
            object-fit: cover; border: 1px solid var(--border-color);
            cursor: pointer; transition: opacity var(--transition);
        }
        .img-preview-thumb:hover { opacity: 0.8; }
        .img-preview-remove {
            background: rgba(0,0,0,0.6); border: none; color: #fff;
            width: 20px; height: 20px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 12px; margin-left: -20px; margin-top: -32px;
            align-self: flex-start; transition: background var(--transition); touch-action: manipulation;
        }
        .img-preview-remove:hover { background: rgba(239,68,68,0.8); }

        .input-box {
            display: flex; align-items: flex-end; gap: 8px;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 10px 12px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-box:focus-within { border-color: #555; box-shadow: 0 0 0 1px #555; }

        .attach-btn {
            background: transparent; border: none; color: var(--text-secondary);
            width: 28px; height: 28px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background var(--transition), color var(--transition), transform 0.15s ease;
            touch-action: manipulation;
        }
        .attach-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .attach-btn:active { transform: scale(0.9); }
        .attach-btn svg { width: 18px; height: 18px; }

        #message-input {
            flex: 1; min-width: 0; background: transparent; border: none;
            color: var(--text-primary); font-size: 15px; font-family: inherit;
            line-height: 1.5; resize: none; min-height: 26px; max-height: 180px;
            outline: none; -webkit-text-size-adjust: 100%;
        }
        #message-input::placeholder { color: var(--text-secondary); }

        .send-btn {
            background: var(--text-primary); border: none; color: var(--bg-primary);
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background var(--transition), transform 0.15s ease, opacity var(--transition);
            touch-action: manipulation;
        }
        .send-btn:hover:not(:disabled) { background: #d4d4d4; }
        .send-btn:active:not(:disabled) { transform: scale(0.9); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .send-btn svg { width: 16px; height: 16px; }
        .input-hint { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 8px; }

        /* ── PANELS ── */
        .panel-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 200; opacity: 0; visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            backdrop-filter: blur(2px);
        }
        .panel-overlay.active { opacity: 1; visibility: visible; }

        .floating-panel {
            position: fixed; top: 60px; right: 12px;
            width: 300px; max-width: calc(100vw - 24px); max-height: calc(100dvh - 80px);
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius); box-shadow: var(--shadow);
            z-index: 300; overflow: hidden; display: flex; flex-direction: column;
            transform: scale(0.92) translateY(-8px); opacity: 0; visibility: hidden;
            transition: transform 0.2s ease, opacity 0.2s ease, visibility 0.2s ease;
            transform-origin: top right;
        }
        .floating-panel.active { transform: scale(1) translateY(0); opacity: 1; visibility: visible; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .panel-title { font-weight: 600; font-size: 0.9rem; }
        .panel-close { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: var(--transition); touch-action: manipulation; }
        .panel-close:hover { background: var(--bg-hover); color: var(--text-primary); }
        .panel-close svg { width: 16px; height: 16px; }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px; -webkit-overflow-scrolling: touch; }

        /* ── HISTORY ── */
        .history-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background var(--transition); margin-bottom: 2px; animation: popUp 0.2s ease; }
        .history-item:hover { background: var(--bg-hover); }
        .history-item.active { background: var(--bg-tertiary); }
        .history-item-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); margin-bottom: 3px; }
        .history-item-date { font-size: 11px; color: var(--text-secondary); }
        .history-item-actions { margin-top: 6px; }
        .history-delete-btn { background: transparent; border: none; color: #f87171; font-size: 11px; cursor: pointer; padding: 3px 8px; border-radius: 5px; transition: var(--transition); touch-action: manipulation; }
        .history-delete-btn:hover { background: rgba(248,113,113,0.1); }
        .no-history { text-align: center; color: var(--text-secondary); padding: 32px 16px; font-size: 13px; }

        /* ── ALERTS ── */
        .error-msg {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5; padding: 10px 14px; border-radius: 10px;
            margin: 8px 0; font-size: 13px; word-wrap: break-word; animation: popUp 0.3s ease;
        }
        .limit-msg {
            background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25);
            color: #fbbf24; padding: 10px 14px; border-radius: 10px;
            margin: 8px 0; font-size: 13px; animation: popUp 0.3s ease;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .top-bar { height: 52px; padding: 0 12px; }
            .chat-inner { padding: 0 12px; }
            .message-bubble { max-width: 88%; font-size: 14px; }
            .floating-panel { right: 8px; left: 8px; width: auto; max-width: none; top: 56px; }
            .input-area { padding: 10px 12px 16px; }
            #message-input { font-size: 16px; }
            .welcome-message { padding: 40px 16px 20px; }
            .message-bubble pre code { font-size: 12px; }
            .bubble-img-wrap { width: 210px; height: 210px; }
            .bubble-img { width: 210px; height: 210px; }
        }
        @media (max-width: 360px) { .message-bubble { max-width: 94%; } .chat-inner { padding: 0 8px; } }
        @media (min-width: 1200px) { .chat-inner { max-width: 760px; } .input-outer { max-width: 760px; } }

        button, a, input, textarea { touch-action: manipulation; }
    </style>
</head>

<!-- INTRO -->
<div id="intro">
    <img id="intro-logo" src="icon.png" alt="Vertigo AI">
</div>

<!-- LIGHTBOX -->

    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="">
</div>

<!-- APP -->

        </div>
    </footer>
</div>

<!-- PANELS -->
<div class="panel-overlay" id="panel-overlay"></div>
<div class="floating-panel" id="history-panel">
    <div class="panel-header">
        <span class="panel-title">History</span>
        <button class="panel-close" id="history-close">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <div class="panel-content" id="history-list"></div>
</div>

function pastChatsContext() {
    const all  = store.get('chats', {});
    const list = Object.values(all)
        .sort(function(a, b) { return b.updatedAt - a.updatedAt; })
        .filter(function(c) { return c.id !== S.chatId; })
        .slice(0, 3);
    if (!list.length) return null;
    let out = '';
    list.forEach(function(chat) {
        const d = new Date(chat.updatedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        out += 'Chat from ' + d + ':\n';
        chat.messages.slice(-6).forEach(function(m) {
            out += (m.role === 'user' ? 'User' : 'Vertigo') + ': ' + (m.content || '').slice(0, 200) + '\n';
        });
        out += '\n';
    });
    return out.trim() || null;

   SEARCH
================================================================ */
async function timedFetch(url, ms) {
    ms = ms || 5000;
    const ctrl = new AbortController();
    const tid  = setTimeout(function() { ctrl.abort(); }, ms);
    try { const r = await fetch(url, { signal: ctrl.signal }); clearTimeout(tid); return r; }
    catch(e) { clearTimeout(tid); return null; }
}

async function wikiSearch(q) {
    try {
        const eq = encodeURIComponent(q.slice(0, 80));
        const r  = await timedFetch('https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + eq + '&srlimit=2&format=json&origin=*', 5000);
        if (!r || !r.ok) return null;
        const data = await r.json();
        const hits = data.query && data.query.search;
        if (!hits || !hits.length) return null;
        const pages = await Promise.allSettled(hits.slice(0, 2).map(async function(h) {
            const s = await timedFetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(h.title), 5000);
            if (!s || !s.ok) return null;
            const d = await s.json();
            return d.extract ? h.title + ': ' + d.extract.slice(0, 300) : null;
        }));
        const out = pages.filter(function(x) { return x.status === 'fulfilled' && x.value; }).map(function(x) { return x.value; });
        return out.length ? out.join('\n') : null;
    } catch(e) { return null; }
}

async function ddgSearch(q) {
    const enc = encodeURIComponent('https://api.duckduckgo.com/?q=' + encodeURIComponent(q) + '&format=json&no_html=1&skip_disambig=1');
    const proxies = ['https://api.allorigins.win/get?url=' + enc, 'https://corsproxy.io/?' + enc];
    for (let i = 0; i < proxies.length; i++) {
        try {
            const r = await timedFetch(proxies[i], 5000);
            if (!r || !r.ok) continue;
            const raw = await r.json();
            const d   = raw.contents ? JSON.parse(raw.contents) : raw;
            const out = [];
            if (d.AbstractText && d.AbstractText.length > 20) out.push(d.AbstractText.slice(0, 300));
            if (d.Answer) out.push(d.Answer);
            if (out.length) return out.join('\n');
        } catch(e) {}
    }
    return null;
}

async function webSearch(q) {
    const [wiki, ddg] = await Promise.allSettled([wikiSearch(q), ddgSearch(q)]);
    const parts = [];
    if (wiki.status === 'fulfilled' && wiki.value) parts.push(wiki.value);
    if (ddg.status  === 'fulfilled' && ddg.value)  parts.push(ddg.value);
    return parts.length ? parts.join('\n\n') : null;
}

/* ================================================================
   GEMINI VISION
================================================================ */
async function geminiVision(base64, mime, question) {
    const url  = 'https://generativelanguage.googleapis.com/v1beta/models/' + VISION_MODEL + ':generateContent?key=' + GEMINI_KEY;
    const body = {
        contents: [{ parts: [
            { text: question || 'Describe this image in detail.' },
            { inline_data: { mime_type: mime, data: base64 } }
        ]}]
    };
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) { const t = await res.text(); throw new Error('Vision error ' + res.status + ': ' + t.slice(0, 200)); }
    const data = await res.json();
    const text = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
    if (!text) throw new Error('Vision returned no text.');
    return text;
}

async function chatStream(messages) {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Content-Type':  'application/json',
            'Authorization': 'Bearer ' + OR_KEY,

            'X-Title':       'Vertigo AI'
        },
        body: JSON.stringify({ model: CHAT_MODEL, messages: messages, stream: true, max_tokens: 1024 })
    });
    if (!res.ok) { const t = await res.text(); throw new Error('API error ' + res.status + ': ' + t.slice(0, 300)); }
    return res;
}

/* ================================================================
   BUILD MESSAGES
================================================================ */
function buildMessages(extra, webData, recallCtx) {
    let sys = SYSTEM_PROMPT;
    if (recallCtx) sys += '\n\nPrevious conversation context:\n' + recallCtx;
    if (webData)   sys += '\n\nCurrent web information:\n' + webData;
    const out = [{ role: 'system', content: sys }];
    S.messages.slice(-12).forEach(function(m) {
        if (!m.content || !m.content.trim()) return;
        out.push({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content });
    });
    if (extra) out.push({ role: 'user', content: extra });
    return out;
}

        const img = document.createElement('img');
        img.className = 'bubble-img'; img.alt = 'image';

        img.src = imageUrl;
        wrap.appendChild(img);
        wrap.addEventListener('click', function() { if (img.complete && img.naturalWidth) openLightbox(imageUrl); });
        bub.appendChild(wrap);
        if (role === 'ai') {
            const acts = document.createElement('div');
            acts.className = 'img-actions';
            const dl = document.createElement('button');
            dl.className = 'img-action-btn'; dl.title = 'Download'; dl.innerHTML = ICON_DL;
            dl.addEventListener('click', function(e) { e.stopPropagation(); downloadImage(imageUrl, 'vertigo-' + Date.now() + '.png'); });
            const op = document.createElement('button');
            op.className = 'img-action-btn'; op.title = 'Open'; op.innerHTML = ICON_EXP;
            op.addEventListener('click', function(e) { e.stopPropagation(); window.open(imageUrl, '_blank'); });
            acts.appendChild(dl); acts.appendChild(op);
            bub.appendChild(acts);
        }
    }

    /* text */
    if (content && content.trim()) {
        if (role === 'ai') {
            const div = document.createElement('div');
            div.innerHTML = marked.parse(content);
            attachCopyBtns(div);
            div.querySelectorAll('pre code').forEach(function(b) { hljs.highlightElement(b); });

                bub.textContent = content;
            }
        }
    }

    row.appendChild(bub);
    UI.chatInner.appendChild(row);
    if (animate) scrollBottom();
    return bub;
}

function attachCopyBtns(el) {
    el.querySelectorAll('pre').forEach(function(pre) {
        if (pre.querySelector('.code-header')) return;

        const m = code.className.match(/language-(\w+)/);

        hdr.className = 'code-header';
        hdr.innerHTML = '<span>' + lang + '</span><button class="copy-btn" onclick="doCopy(this)">' + ICON_COPY + ' Copy</button>';
        pre.insertBefore(hdr, code);
    });
}

/* ================================================================
   STREAM REPLY — real CoT via <think> tokens
================================================================ */
async function streamReply(apiResponse) {
    const row = document.createElement('div');
    row.className = 'message ai';
    const bub = document.createElement('div');
    bub.className = 'message-bubble';
    const contentEl = document.createElement('div');
    bub.appendChild(contentEl);
    row.appendChild(bub);
    UI.chatInner.appendChild(row);

    let full = '', thinking = '', inThink = false, firstToken = false, hlTimer = null;
    const reader  = apiResponse.body.getReader();
    const decoder = new TextDecoder();

    try {
        outer: while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const lines = decoder.decode(value, { stream: true }).split('\n');
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line.startsWith('data:')) continue;
                const raw = line.slice(5).trim();
                if (raw === '[DONE]') break outer;
                if (!raw) continue;
                let parsed;
                try { parsed = JSON.parse(raw); } catch(e) { continue; }
                const delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta && parsed.choices[0].delta.content;
                if (!delta) continue;

                let buf = delta;
                while (buf.length > 0) {
                    if (inThink) {
                        const end = buf.indexOf('</think>');
                        if (end !== -1) {
                            thinking += buf.slice(0, end);
                            buf = buf.slice(end + 8);
                            inThink = false;
                            cot.set('Typing…');
                        } else {
                            thinking += buf; buf = '';
                            const words = thinking.trim().split(/\s+/);
                            cot.set(words.slice(-8).join(' ') || 'Thinking…');
                        }
                    } else {
                        const start = buf.indexOf('<think>');
                        if (start !== -1) {
                            const before = buf.slice(0, start);
                            if (before) full += before;
                            buf = buf.slice(start + 7);
                            inThink = true;
                        } else {
                            if (!firstToken) { firstToken = true; cot.remove(); }
                            full += buf; buf = '';
                        }
                    }
                }

                if (full) {
                    contentEl.innerHTML = marked.parse(full);
                    attachCopyBtns(contentEl);
                    scrollBottom();
                }

                if (hlTimer) clearTimeout(hlTimer);
                hlTimer = setTimeout(function() {
                    contentEl.querySelectorAll('pre code:not([data-hl])').forEach(function(b) { hljs.highlightElement(b); b.dataset.hl = '1'; });
                }, 300);
            }
        }
    } catch(e) { console.error('Stream error:', e); }

    cot.remove();
    if (hlTimer) clearTimeout(hlTimer);
    contentEl.querySelectorAll('pre code:not([data-hl])').forEach(function(b) { hljs.highlightElement(b); b.dataset.hl = '1'; });

    if (!full.trim()) { row.remove(); showError('Empty reply. Try again.'); return; }

    S.messages.push({ role: 'ai', content: full });
    saveChat();
}

function togglePanel(p) {

    if (!open) { p.classList.add('active'); UI.overlay.classList.add('active'); }

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function ago(ts) {
    const d = Date.now() - ts;
    if (d < 60000)    return 'Just now';
    if (d < 3600000)  return Math.floor(d / 60000) + 'm ago';
    if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
    return new Date(ts).toLocaleDateString();
}

/* ================================================================
   SEND
================================================================ */
let lastSend = 0;

async function send(userText) {
    userText = (userText || '').trim();
    const hasImg = !!S.pendingImg;
    if (!userText && !hasImg) return;
    if (S.busy) return;
    if (Date.now() - lastSend < 600) return;
    lastSend = Date.now();
    S.busy = true; UI.sendBtn.disabled = true;
    const imgSnap = S.pendingImg; clearPreview();

    /* ── IMAGE ANALYZE ── */
    if (hasImg) {
        if (S.analyzeCount >= MAX_ANALYZES) { showLimit('Image analysis limit reached.'); S.busy = false; UI.sendBtn.disabled = false; return; }
        S.analyzeCount++;
        const question = userText || 'What do you see in this image?';
        S.messages.push({ role: 'user', content: question, imageUrl: imgSnap.dataUrl });
        appendBubble('user', question, imgSnap.dataUrl, true);
        saveChat();
        try {
            cot.show('Reading your image…');
            const vision = await geminiVision(imgSnap.base64, imgSnap.mime, question);
            cot.set('Got it…');
            const msgs = buildMessages('The user shared an image. Here is what it contains:\n\n' + vision + '\n\nRespond naturally.', null, null);
            const api  = await chatStream(msgs);
            await streamReply(api);
        } catch(err) { console.error(err); cot.remove(); showError(err.message); }
        finally { S.busy = false; UI.sendBtn.disabled = false; }
        return;
    }

    /* ── IMAGE CREATE ── */
    if (isImageRequest(userText)) {
        if (S.createCount >= MAX_CREATES) { showLimit('Image creation limit reached.'); S.busy = false; UI.sendBtn.disabled = false; return; }
        S.createCount++;
        S.messages.push({ role: 'user', content: userText });
        appendBubble('user', userText, null, true);
        saveChat();
        const phRow = document.createElement('div'); phRow.className = 'message ai';
        const phBub = document.createElement('div'); phBub.className = 'message-bubble';
        const phWrap = document.createElement('div'); phWrap.className = 'bubble-img-wrap';
        phWrap.innerHTML = '<div class="img-skeleton"><div class="img-skeleton-dots"><span></span><span></span><span></span></div><div class="img-skeleton-label">Generating…</div></div>';
        phBub.appendChild(phWrap); phRow.appendChild(phBub); UI.chatInner.appendChild(phRow); scrollBottom();
        try {
            const imgUrl = pollinationsUrl(userText);
            phRow.remove();
            S.messages.push({ role: 'ai', content: '', imageUrl: imgUrl });
            appendBubble('ai', '', imgUrl, true);
            saveChat();
        } catch(err) { console.error(err); phRow.remove(); showError(err.message); }
        finally { S.busy = false; UI.sendBtn.disabled = false; }
        return;
    }

    /* ── NORMAL CHAT ── */
    S.messages.push({ role: 'user', content: userText });
    appendBubble('user', userText, null, true);
    saveChat();
    try {
        cot.show('Thinking…');
        const doSearch = needsSearch(userText);
        const doRecall = isRecallRequest(userText);
        if (doSearch || doRecall) cot.set('Searching…');
        const [sr, rr] = await Promise.allSettled([
            doSearch ? webSearch(userText)                 : Promise.resolve(null),
            doRecall ? Promise.resolve(pastChatsContext()) : Promise.resolve(null)
        ]);
        const webData   = sr.status === 'fulfilled' ? sr.value : null;
        const recallCtx = rr.status === 'fulfilled' ? rr.value : null;
        cot.set('Thinking…');
        const msgs = buildMessages(null, webData, recallCtx);
        const api  = await chatStream(msgs);
        await streamReply(api);
    } catch(err) { console.error(err); cot.remove(); showError(err.message); }
    finally { S.busy = false; UI.sendBtn.disabled = false; }
}
